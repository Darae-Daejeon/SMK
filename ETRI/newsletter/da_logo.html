      position: relative;

      background-repeat: no-repeat;
      background-position: center top;
      background-size: 100% auto;
    }

    .hotspot {
      position: absolute;
      left: calc(var(--x) / 800 * 100%);
      top: calc(var(--y) / 2137 * 100%);
      width: calc(var(--w) / 800 * 100%);
      height: calc(var(--h) / 2137 * 100%);
      border-radius: 6px;
    }

    .hotspot:focus-visible {
      outline: 3px solid #fff;
      outline-offset: -3px;
      background: rgb(0 174 199 / 18%);
    }

    @media print {
      html,

        background: #fff;
      }

    }
